<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading Speed Trainer</title>

  <style>
    :root {
      --bg: #110A0A;
      --panel: #1A1111;
      --panel-light: #2D1D1B;
      --border: #46302C;
      --text: #F3EDEA;
      --muted: #B8A09A;
      --accent: #E24A3B;
      --accent-soft: rgba(226, 74, 59, 0.16);
      --highlight: #B88A52;
      --highlight-text: #110A0A;
      --danger: #E26B5C;
      --success: #FF7A59;
      --bronze: #B88A52;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      height: 100dvh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(226, 74, 59, 0.15), transparent 35%),
        radial-gradient(circle at bottom right, rgba(122, 34, 29, 0.18), transparent 38%),
        var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .app {
      height: 100vh;
      height: 100dvh;
      display: grid;
      grid-template-rows: 1fr auto 25vh;
      gap: 14px;
      padding: 18px;
    }

    .reader-panel {
      background: linear-gradient(180deg, rgba(23, 33, 49, 0.9), rgba(13, 18, 27, 0.95));
      border: 1px solid var(--border);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .title-block h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0.3px;
    }

    .title-block p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .status-group {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .status-pill {
      padding: 8px 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      border-radius: 999px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .status-pill.active {
      color: var(--success);
      border-color: rgba(110, 231, 183, 0.35);
      background: rgba(110, 231, 183, 0.08);
    }

    .flash-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      text-align: center;
    }

    #display {
      max-width: 90%;
      font-size: clamp(42px, 6vw, 96px);
      line-height: 1.18;
      font-weight: 700;
      letter-spacing: -1.5px;
      text-wrap: balance;
    }

    .controls-panel {
      background: rgba(17, 23, 34, 0.88);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 8px 10px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    input {
      width: 82px;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 9px;
      padding: 9px 10px;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    button {
      border: 0;
      border-radius: 11px;
      padding: 10px 16px;
      font-size: 15px;
      cursor: pointer;
      color: var(--text);
      background: var(--panel-light);
      transition: transform 0.08s ease, background 0.15s ease, opacity 0.15s ease;
      touch-action: manipulation;
    }

    button:hover {
      background: #3b2825;
    }

    button:active {
      transform: scale(0.98);
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), #ff7156);
      color: var(--text);
      font-weight: 700;
    }

    .primary:hover {
      background: linear-gradient(135deg, #ef5d4c, var(--success));
    }

    .stop {
      background: linear-gradient(135deg, #7A221D, var(--accent));
      color: var(--text);
      font-weight: 700;
    }

    .danger {
      background: rgba(255, 107, 107, 0.14);
      color: #f3b0a7;
      border: 1px solid rgba(255, 107, 107, 0.25);
    }

    .danger:hover {
      background: rgba(255, 107, 107, 0.22);
    }

    .text-panel {
      background: rgba(17, 23, 34, 0.94);
      border: 1px solid var(--border);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .text-panel-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .text-panel-header strong {
      font-size: 14px;
      white-space: nowrap;
    }

    .text-panel-header span {
      margin-left: auto;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    #sourceText {
      flex: 1;
      min-width: 120px;
      max-width: 620px;
      width: auto;
      padding: 7px 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
    }

    #sourceTrace {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px 18px;
      outline: none;
      color: var(--text);
      font-size: 18px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #sourceTrace:empty::before {
      content: "Paste your text here. Click any word while stopped to choose where reading starts.";
      color: #7F625C;
    }

    .word {
      border-radius: 6px;
      padding: 1px 2px;
      margin: 0 1px;
      cursor: pointer;
    }

    .word:hover {
      background: rgba(93, 214, 255, 0.14);
    }

    .word.selected {
      background: rgba(93, 214, 255, 0.32);
      color: var(--text);
      box-shadow: 0 0 0 2px rgba(93, 214, 255, 0.12);
    }

    .word.current {
      background: var(--highlight);
      color: var(--highlight-text);
      box-shadow: 0 0 0 2px rgba(255, 224, 102, 0.15);
    }

    .word.past {
      color: #7F625C;
    }

    .progress-bar {
      height: 4px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .page-nav {
      position: fixed;
      z-index: 10;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      padding: 5px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(26, 17, 17, 0.92);
      backdrop-filter: blur(10px);
    }

    .page-nav.hidden { display: none; }

    .page-nav button {
      padding: 8px 11px;
      font-size: 13px;
      background: transparent;
      color: var(--muted);
    }

    .page-nav button.active { background: var(--panel-light); color: var(--text); }
    .page { display: none; }
    .page.active { display: grid; }
    .reader-page .top-bar { padding: 66px 22px 18px; }

    .planner-app {
      grid-template-rows: auto minmax(0, 1fr);
      max-width: 980px;
      margin: 0 auto;
    }

    .home-app { grid-template-rows: minmax(0, 1fr); max-width: 760px; margin: 0 auto; }
    .home-panel { display: grid; grid-template-columns: 1fr; grid-template-rows: repeat(2, minmax(0, 1fr)); gap: 18px; align-items: stretch; }
    .home-choice { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; gap: clamp(20px, 6vw, 58px); padding: 24px 36px; border: 1px solid var(--border); border-radius: 24px; background: linear-gradient(145deg, rgba(45,29,27,.96), rgba(26,17,17,.94)); color: var(--text); font-size: clamp(26px, 4vw, 38px); font-weight: 700; box-shadow: 0 20px 60px rgba(36, 8, 7, .35); }
    .home-choice::after { content: ""; position: absolute; inset: auto -20% -45% auto; width: 90%; aspect-ratio: 1; background: radial-gradient(circle, rgba(255,122,89,.2), transparent 65%); }
    .home-choice:hover { border-color: var(--accent); background: linear-gradient(145deg, rgba(122,34,29,.75), rgba(45,29,27,.96)); }
    .home-choice img { position: relative; z-index: 1; width: min(34vw, 190px); aspect-ratio: 1; object-fit: contain; }
    .home-choice span { position: relative; z-index: 1; }

    .planner-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 66px 4px 4px;
    }

    .planner-header h1 { margin: 0; font-size: 28px; }
    .planner-header p { margin: 5px 0 0; color: var(--muted); }
    #plannerDate { color: var(--accent); font-size: 14px; white-space: nowrap; }
    .list-switcher { display: inline-flex; gap: 4px; margin-top: 17px; padding: 4px; border: 1px solid var(--border-soft, #35201C); border-radius: 11px; background: rgba(17,10,10,.42); }
    .list-switcher button { padding: 8px 13px; background: transparent; color: var(--muted); font-size: 13px; }
    .list-switcher button.active { background: var(--accent); color: var(--text); }

    .planner-panel {
      min-height: 0;
      overflow-y: auto;
      padding: 22px;
      background: linear-gradient(180deg, rgba(23, 33, 49, .92), rgba(13, 18, 27, .96));
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .35);
    }

    .task-form { display: grid; grid-template-columns: minmax(0, 1fr) 135px auto; gap: 10px; align-items: center; }
    .task-form input { width: 100%; }
    select { width: 100%; background: var(--panel); border: 1px solid var(--border); color: var(--text); border-radius: 9px; padding: 10px; font-size: 14px; outline: none; }
    select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    #weeklyDays { display: none; grid-column: 1 / -1; gap: 7px; grid-template-columns: repeat(7, 1fr); }
    #weeklyDays.visible { display: grid; }
    .day-choice { display: flex; align-items: center; justify-content: center; gap: 4px; color: var(--muted); font-size: 12px; padding: 7px 4px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07); border-radius: 8px; cursor: pointer; }
    .day-choice input { width: auto; accent-color: var(--accent); }
    .task-summary { display: flex; justify-content: space-between; gap: 10px; align-items: center; margin: 27px 0 12px; color: var(--muted); font-size: 14px; }
    .task-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 9px; }
    .task-item { display: flex; align-items: center; gap: 12px; padding: 14px; border: 1px solid rgba(255,255,255,.08); border-radius: 13px; background: rgba(255,255,255,.035); }
    .task-item.done { opacity: .58; }
    .task-item input { width: 20px; height: 20px; accent-color: var(--success); flex: 0 0 auto; }
    .task-name { flex: 1; line-height: 1.35; }
    .task-item.done .task-name { text-decoration: line-through; }
    .recurrence-tag { color: var(--accent); font-size: 12px; background: var(--accent-soft); border-radius: 999px; padding: 5px 8px; white-space: nowrap; }
    .icon-button { flex: 0 0 auto; padding: 7px 10px; color: #f3b0a7; background: transparent; }
    .icon-button:hover { background: rgba(255,107,107,.14); }
    .empty-tasks { padding: 38px 15px; color: var(--muted); text-align: center; border: 1px dashed var(--border); border-radius: 13px; }

    #progressFill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--success));
      transition: width 0.15s linear;
    }

    body.reading-mode .app {
      grid-template-rows: minmax(0, 1fr) auto minmax(110px, 18vh);
    }

    body.reading-mode .control-group,
    body.reading-mode #resetButton,
    body.reading-mode #sourceText {
      display: none;
    }

    body.reading-mode .controls-panel {
      padding: 8px;
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }

    body.reading-mode #playButton {
      min-width: 150px;
      font-size: 17px;
      padding: 12px 24px;
    }

    body.reading-mode #sourceTrace {
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.5;
    }

    @media (max-width: 700px) {
      .app {
        padding: 10px;
        gap: 10px;
        grid-template-rows: 1fr auto 32vh;
      }

      .top-bar {
        padding: 14px;
        align-items: flex-start;
        gap: 10px;
      }

      .page-nav { top: 9px; left: 50%; }
      .page-nav button { padding: 7px 8px; font-size: 12px; }
      .title-block { padding-right: 135px; }
      .reader-page .top-bar { padding: 54px 14px 14px; }
      .planner-header { display: block; padding-top: 52px; }
      #plannerDate { display: block; margin-top: 9px; }
      .planner-panel { padding: 14px; border-radius: 18px; }
      .task-form { grid-template-columns: 1fr 110px; }
      .task-form button { grid-column: 1 / -1; }
      #weeklyDays { grid-template-columns: repeat(4, 1fr); }
      .home-choice { gap: 20px; padding: 16px 22px; }
      .home-choice img { width: min(38vw, 155px); }

      .title-block h1 {
        font-size: 18px;
      }

      .status-pill {
        font-size: 12px;
      }

      .controls-panel {
        justify-content: stretch;
      }

      .control-group {
        width: 100%;
        justify-content: space-between;
      }

      button {
        flex: 1;
      }

      #display {
        font-size: clamp(36px, 11vw, 70px);
      }

      #sourceText,
      #sourceTrace {
        font-size: 16px;
      }

      #sourceText {
        min-width: 0;
      }

      body.reading-mode .app {
        grid-template-rows: minmax(0, 1fr) auto minmax(96px, 16vh);
      }

      body.reading-mode .title-block p {
        display: none;
      }
    }
  </style>
</head>

<body>
  <nav class="page-nav" aria-label="App pages">
    <button id="homePageButton" class="active" type="button">Home</button>
    <button id="readerPageButton" type="button">Reader</button>
    <button id="plannerPageButton" type="button">Daily list</button>
  </nav>

  <main class="app page home-app active" id="homePage">
    <section class="home-panel">
      <button class="home-choice" type="button" data-go-to="reader">
        <img src="assets-eclipse-moth.png" alt="Eclipse moth mascot" />
        <span>Reader</span>
      </button>
      <button class="home-choice" type="button" data-go-to="planner">
        <img src="assets-ember-salamander.png" alt="Ember salamander mascot" />
        <span>Checklist</span>
      </button>
    </section>
  </main>

  <main class="app page reader-page" id="readerPage">
    <section class="reader-panel">
      <div class="top-bar">
        <div class="title-block">
          <h1>Reading Speed Trainer</h1>
          <p>Paste text below, choose your speed ramp, then start the word stream.</p>
        </div>

        <div class="status-group">
          <div class="status-pill" id="speedPill">Current: 0 WPM</div>
          <div class="status-pill" id="statusPill">Ready</div>
        </div>
      </div>

      <div class="flash-area">
        <div id="display">Paste text below to begin</div>
      </div>
    </section>

    <section class="controls-panel">
      <div class="control-group">
        <label for="warmupWpmInput">Warm-up WPM</label>
        <input id="warmupWpmInput" type="number" value="250" min="50" max="1500" />
      </div>

      <div class="control-group">
        <label for="targetWpmInput">Target WPM</label>
        <input id="targetWpmInput" type="number" value="500" min="50" max="1500" />
      </div>

      <div class="control-group">
        <label for="rampSecondsInput">Ramp time</label>
        <input id="rampSecondsInput" type="number" value="60" min="0" max="3600" />
        <label>sec</label>
      </div>

      <div class="control-group">
        <label for="chunkInput">Words at once</label>
        <input id="chunkInput" type="number" value="3" min="1" max="12" />
      </div>

      <button id="playButton" class="primary">Start</button>
      <button id="resetButton" class="danger">Reset</button>
    </section>

    <section class="text-panel">
      <div class="text-panel-header">
        <strong>Source text</strong>
        <input id="sourceText" type="text" aria-label="Source text" placeholder="Paste or edit text here" />
        <span id="stats">Progress: 0 / 0 words</span>
      </div>

      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>

      <div id="sourceTrace" aria-label="Source text trace"></div>
    </section>
  </main>

  <main class="app page planner-app" id="plannerPage">
    <header class="planner-header">
      <div>
        <h1>Daily checklist</h1>
        <p>Plan ahead, then let scheduled tasks return when they are due.</p>
        <div class="list-switcher" aria-label="Checklist day">
          <button id="todayListButton" class="active" type="button">Today</button>
          <button id="tomorrowListButton" type="button">Tomorrow</button>
        </div>
      </div>
      <time id="plannerDate"></time>
    </header>

    <section class="planner-panel">
      <form class="task-form" id="taskForm">
        <input id="taskTitleInput" type="text" maxlength="160" placeholder="What needs to get done?" aria-label="Task name" required />
        <select id="recurrenceInput" aria-label="Task schedule">
          <option value="once">Today only</option>
          <option value="daily">Every day</option>
          <option value="weekly">Weekly</option>
        </select>
        <button class="primary" type="submit">Add task</button>
        <div id="weeklyDays" aria-label="Weekly schedule">
          <label class="day-choice"><input type="checkbox" value="1" />Mon</label>
          <label class="day-choice"><input type="checkbox" value="2" />Tue</label>
          <label class="day-choice"><input type="checkbox" value="3" />Wed</label>
          <label class="day-choice"><input type="checkbox" value="4" />Thu</label>
          <label class="day-choice"><input type="checkbox" value="5" />Fri</label>
          <label class="day-choice"><input type="checkbox" value="6" />Sat</label>
          <label class="day-choice"><input type="checkbox" value="0" />Sun</label>
        </div>
      </form>

      <div class="task-summary">
        <span id="taskSummary">0 tasks for today</span>
        <span id="taskProgress">0 complete</span>
      </div>
      <ul id="taskList" class="task-list" aria-live="polite"></ul>
    </section>
  </main>

  <script>
    /*
      Reading Speed Trainer
      ---------------------
      Structure designed for future expansion:
      - AppState stores all app data.
      - Elements stores all DOM references.
      - SettingsRepository isolates local settings persistence.
      - TextDocument owns input-to-state synchronization.
      - SourceTrace handles read-only source highlighting.
      - ReaderEngine handles playback and speed ramp timing.

      Future additions can be added as new modules:
      - ReadingHistory
      - GoalTracker
      - HabitTracker
      - SyncManager
    */

    const AppState = {
      rawText: "",
      words: [],
      currentIndex: 0,
      selectedIndex: 0,
      currentChunkStart: 0,
      currentChunkEnd: 0,
      isPrepared: false,
      isPlaying: false,
      playbackStartTime: null,
      timeoutId: null,
      activeSession: null
    };

    const Elements = {
      sourceText: document.getElementById("sourceText"),
      pageNav: document.querySelector(".page-nav"),
      sourceTrace: document.getElementById("sourceTrace"),
      display: document.getElementById("display"),
      stats: document.getElementById("stats"),
      statusPill: document.getElementById("statusPill"),
      speedPill: document.getElementById("speedPill"),
      progressFill: document.getElementById("progressFill"),
      playButton: document.getElementById("playButton"),
      resetButton: document.getElementById("resetButton"),
      warmupWpmInput: document.getElementById("warmupWpmInput"),
      targetWpmInput: document.getElementById("targetWpmInput"),
      rampSecondsInput: document.getElementById("rampSecondsInput"),
      chunkInput: document.getElementById("chunkInput"),
      homePage: document.getElementById("homePage"),
      readerPage: document.getElementById("readerPage"),
      plannerPage: document.getElementById("plannerPage"),
      homePageButton: document.getElementById("homePageButton"),
      readerPageButton: document.getElementById("readerPageButton"),
      plannerPageButton: document.getElementById("plannerPageButton"),
      taskForm: document.getElementById("taskForm"),
      taskTitleInput: document.getElementById("taskTitleInput"),
      recurrenceInput: document.getElementById("recurrenceInput"),
      weeklyDays: document.getElementById("weeklyDays"),
      taskList: document.getElementById("taskList"),
      taskSummary: document.getElementById("taskSummary"),
      taskProgress: document.getElementById("taskProgress"),
      plannerDate: document.getElementById("plannerDate"),
      todayListButton: document.getElementById("todayListButton"),
      tomorrowListButton: document.getElementById("tomorrowListButton")
    };

    const SettingsRepository = {
      settingsKey: "readingTrainer.settings.v1",

      saveSettings() {
        try {
          const settings = ReaderEngine.getSettings();
          localStorage.setItem(this.settingsKey, JSON.stringify(settings));
        } catch {
          console.warn("Settings could not be saved.");
        }
      },

      loadSettings() {
        try {
          const saved = localStorage.getItem(this.settingsKey);
          if (!saved) return;

          const settings = JSON.parse(saved);

          if (settings.warmupWpm) Elements.warmupWpmInput.value = settings.warmupWpm;
          if (settings.targetWpm) Elements.targetWpmInput.value = settings.targetWpm;
          if (settings.rampSeconds !== undefined) Elements.rampSecondsInput.value = settings.rampSeconds;
          if (settings.chunkSize) Elements.chunkInput.value = settings.chunkSize;
        } catch {
          console.warn("Saved settings could not be loaded.");
        }
      }
    };

    const TextTools = {
      splitIntoWords(text) {
        return text
          .trim()
          .split(/\s+/)
          .filter(word => word.length > 0);
      },

      escapeHtml(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      },

      getPlainTextFromSource() {
        return Elements.sourceText.value.trim();
      }
    };

    const SourceTrace = {
      render({ scroll = true } = {}) {
        if (AppState.words.length === 0) {
          Elements.sourceTrace.textContent = "";
          return;
        }

        const html = AppState.words.map((word, index) => {
          const safeWord = TextTools.escapeHtml(word);
          const classes = ["word"];

          if (index >= AppState.currentChunkStart && index < AppState.currentChunkEnd) {
            classes.push("current");
          } else if (!AppState.isPlaying && index === AppState.selectedIndex) {
            classes.push("selected");
          } else if (index < AppState.currentChunkStart) {
            classes.push("past");
          }

          return `<span class="${classes.join(" ")}" data-index="${index}" id="word-${index}">${safeWord}</span>`;
        }).join(" ");

        Elements.sourceTrace.innerHTML = html;

        if (scroll) this.scrollToActiveWord();
      },

      scrollToActiveWord() {
        const activeIndex = AppState.isPlaying
          ? AppState.currentChunkStart
          : AppState.selectedIndex;

        const activeElement = document.getElementById("word-" + activeIndex);

        if (activeElement) {
          activeElement.scrollIntoView({
            behavior: "smooth",
            block: "center",
            inline: "nearest"
          });
        }
      }
    };

    const TextDocument = {
      syncFromEditor({ preserveSelection = false, scrollTrace = true } = {}) {
        AppState.rawText = TextTools.getPlainTextFromSource();
        AppState.words = TextTools.splitIntoWords(AppState.rawText);

        const maxIndex = Math.max(AppState.words.length - 1, 0);
        AppState.selectedIndex = preserveSelection
          ? Math.min(AppState.selectedIndex, maxIndex)
          : 0;
        AppState.currentIndex = AppState.selectedIndex;
        AppState.currentChunkStart = AppState.selectedIndex;
        AppState.currentChunkEnd = AppState.selectedIndex;
        AppState.isPrepared = true;

        SourceTrace.render({ scroll: scrollTrace });
      }
    };

    const UI = {
      setStatus(text, active = false) {
        Elements.statusPill.textContent = text;
        Elements.statusPill.classList.toggle("active", active);
      },

      setPlayButton(isPlaying) {
        Elements.playButton.textContent = isPlaying ? "Stop" : "Start";
        Elements.playButton.classList.toggle("stop", isPlaying);
        Elements.playButton.classList.toggle("primary", !isPlaying);
        document.body.classList.toggle("reading-mode", isPlaying);
        Elements.pageNav.classList.toggle(
          "hidden",
          isPlaying || Elements.homePage.classList.contains("active")
        );
      },

      updateStats() {
        const total = AppState.words.length;
        const completed = Math.min(AppState.currentIndex, total);
        const percentage = total === 0 ? 0 : (completed / total) * 100;

        Elements.stats.textContent = `Progress: ${completed} / ${total} words`;
        Elements.progressFill.style.width = percentage + "%";
      },

      updateIdleStats() {
        const idleWords = AppState.rawText.length === 0
          ? []
          : TextTools.splitIntoWords(AppState.rawText);

        Elements.stats.textContent = `Progress: 0 / ${idleWords.length} words`;
        Elements.progressFill.style.width = "0%";
      },

      updateSpeedPill(wpm) {
        Elements.speedPill.textContent = `Current: ${Math.round(wpm)} WPM`;
      }
    };

    const ReaderEngine = {
      getSettings() {
        const warmupWpm = Number(Elements.warmupWpmInput.value);
        const targetWpm = Number(Elements.targetWpmInput.value);
        const rampSeconds = Number(Elements.rampSecondsInput.value);
        const chunkSize = Number(Elements.chunkInput.value);

        return {
          warmupWpm: Math.max(50, Math.min(warmupWpm || 250, 1500)),
          targetWpm: Math.max(50, Math.min(targetWpm || 500, 1500)),
          rampSeconds: Math.max(0, Math.min(rampSeconds || 0, 3600)),
          chunkSize: Math.max(1, Math.min(chunkSize || 3, 12))
        };
      },

      prepareFromText() {
        TextDocument.syncFromEditor({ preserveSelection: true });
        UI.updateStats();
      },

      togglePlayback() {
        if (AppState.isPlaying) {
          this.stop();
        } else {
          this.start();
        }
      },

      start() {
        this.prepareFromText();

        if (AppState.words.length === 0) {
          Elements.display.textContent = "Paste text below first";
          UI.setStatus("No text");
          return;
        }

        if (AppState.currentIndex >= AppState.words.length) {
          AppState.currentIndex = AppState.selectedIndex || 0;
        }

        Elements.sourceText.blur();
        SettingsRepository.saveSettings();

        AppState.isPlaying = true;
        AppState.playbackStartTime = Date.now();
        AppState.activeSession = {
          startedAt: new Date().toISOString(),
          startIndex: AppState.currentIndex,
          wordsAtStart: AppState.words.length
        };

        UI.setStatus("Playing", true);
        UI.setPlayButton(true);

        this.playNextChunk();
      },

      stop() {
        clearTimeout(AppState.timeoutId);
        AppState.timeoutId = null;
        AppState.isPlaying = false;

        AppState.selectedIndex = Math.min(AppState.currentIndex, Math.max(AppState.words.length - 1, 0));

        UI.setStatus("Stopped");
        UI.setPlayButton(false);

        SourceTrace.render();
      },

      reset() {
        clearTimeout(AppState.timeoutId);

        AppState.timeoutId = null;
        AppState.isPlaying = false;
        AppState.currentIndex = 0;
        AppState.selectedIndex = 0;
        AppState.currentChunkStart = 0;
        AppState.currentChunkEnd = 0;
        AppState.isPrepared = false;
        AppState.activeSession = null;

        Elements.display.textContent = AppState.rawText.length > 0
          ? "Press Start to begin"
          : "Paste text below to begin";

        UI.setStatus("Ready");
        UI.setPlayButton(false);
        UI.updateSpeedPill(0);
        UI.updateIdleStats();
        SourceTrace.render();
      },

      playNextChunk() {
        if (!AppState.isPlaying) return;

        const settings = this.getSettings();

        if (AppState.currentIndex >= AppState.words.length) {
          this.finish();
          return;
        }

        AppState.currentChunkStart = AppState.currentIndex;
        AppState.currentChunkEnd = Math.min(
          AppState.currentIndex + settings.chunkSize,
          AppState.words.length
        );

        const chunk = AppState.words.slice(AppState.currentChunkStart, AppState.currentChunkEnd);
        Elements.display.textContent = chunk.join(" ");

        AppState.currentIndex = AppState.currentChunkEnd;

        const currentWpm = this.calculateCurrentWpm();
        const delay = this.calculateDelay(currentWpm, settings.chunkSize);

        UI.updateSpeedPill(currentWpm);
        UI.updateStats();
        SourceTrace.render();

        AppState.timeoutId = setTimeout(() => {
          this.playNextChunk();
        }, delay);
      },

      calculateCurrentWpm() {
        const settings = this.getSettings();

        if (settings.rampSeconds <= 0 || settings.warmupWpm === settings.targetWpm) {
          return settings.targetWpm;
        }

        const elapsedSeconds = (Date.now() - AppState.playbackStartTime) / 1000;
        const rampProgress = Math.min(elapsedSeconds / settings.rampSeconds, 1);

        return settings.warmupWpm + rampProgress * (settings.targetWpm - settings.warmupWpm);
      },

      calculateDelay(currentWpm, chunkSize) {
        return Math.max(80, (60000 / currentWpm) * chunkSize);
      },

      finish() {
        clearTimeout(AppState.timeoutId);

        AppState.timeoutId = null;
        AppState.isPlaying = false;
        AppState.selectedIndex = 0;

        Elements.display.textContent = "Finished";

        UI.setStatus("Finished");
        UI.setPlayButton(false);
        UI.updateStats();

        /*
          Future reading history can be recorded here.
          Example later:
          ReadingHistory.addSession({
            date,
            wordsRead,
            duration,
            averageWpm
          });
        */
      },

      setStartIndex(index) {
        if (AppState.isPlaying) return;

        if (!AppState.isPrepared) {
          this.prepareFromText();
        }

        if (AppState.words.length === 0) return;

        AppState.selectedIndex = Math.max(0, Math.min(index, AppState.words.length - 1));
        AppState.currentIndex = AppState.selectedIndex;
        AppState.currentChunkStart = AppState.selectedIndex;
        AppState.currentChunkEnd = AppState.selectedIndex;

        Elements.display.textContent = `Start from: ${AppState.words[AppState.selectedIndex]}`;

        UI.setStatus(`Start point: word ${AppState.selectedIndex + 1}`);
        UI.updateStats();

        SourceTrace.render();
      }
    };

    const Planner = {
      storageKey: "readingTrainer.dailyChecklist.v1",
      data: { currentDate: "", days: {}, templates: [] },
      viewOffset: 0,

      getDateKey(date = new Date()) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      },

      load() {
        try {
          const saved = JSON.parse(localStorage.getItem(this.storageKey));
          if (saved && Array.isArray(saved.templates)) {
            this.data = saved.days
              ? { currentDate: saved.currentDate || "", days: saved.days, templates: saved.templates }
              : { currentDate: saved.currentDate || "", days: { [saved.currentDate]: saved.entries || [] }, templates: saved.templates };
          }
        } catch {
          console.warn("Checklist could not be loaded.");
        }
        this.ensureCurrentDay();
      },

      save() {
        try {
          localStorage.setItem(this.storageKey, JSON.stringify(this.data));
        } catch {
          console.warn("Checklist could not be saved.");
        }
      },

      isDueToday(template, date = new Date()) {
        return template.recurrence === "daily" ||
          (template.recurrence === "weekly" && template.days.includes(date.getDay()));
      },

      dateFromKey(key) {
        const [year, month, day] = key.split("-").map(Number);
        return new Date(year, month - 1, day);
      },

      getKeyForOffset(offset) {
        const date = new Date();
        date.setDate(date.getDate() + offset);
        return this.getDateKey(date);
      },

      ensureDay(key) {
        const date = this.dateFromKey(key);
        const entries = this.data.days[key] || [];
        const recurringEntries = this.data.templates
          .filter(template => this.isDueToday(template, date))
          .filter(template => !entries.some(entry => entry.templateId === template.id))
          .map(template => ({
            id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
            templateId: template.id,
            title: template.title,
            completed: false
          }));
        this.data.days[key] = [...entries, ...recurringEntries];
      },

      ensureCurrentDay() {
        const today = this.getDateKey();
        const tomorrow = this.getKeyForOffset(1);
        this.data.currentDate = today;
        this.ensureDay(today);
        this.ensureDay(tomorrow);
        Object.keys(this.data.days).forEach(key => {
          if (key !== today && key !== tomorrow) delete this.data.days[key];
        });
        this.save();
      },

      addTask(title, recurrence, days) {
        const cleanTitle = title.trim();
        if (!cleanTitle) return;

        const id = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`;
        const dateKey = this.getKeyForOffset(this.viewOffset);
        if (recurrence === "once") {
          this.data.days[dateKey].push({ id, title: cleanTitle, completed: false });
        } else {
          const template = { id, title: cleanTitle, recurrence, days };
          this.data.templates.push(template);
          if (this.isDueToday(template, this.dateFromKey(dateKey))) {
            this.data.days[dateKey].push({ id: `${id}-${dateKey}`, templateId: id, title: cleanTitle, completed: false });
          }
        }
        this.save();
        this.render();
      },

      toggleTask(id) {
        const task = this.data.days[this.getKeyForOffset(this.viewOffset)].find(entry => entry.id === id);
        if (!task) return;
        task.completed = !task.completed;
        this.save();
        this.render();
      },

      removeTask(id) {
        const dateKey = this.getKeyForOffset(this.viewOffset);
        const task = this.data.days[dateKey].find(entry => entry.id === id);
        if (!task) return;
        this.data.days[dateKey] = this.data.days[dateKey].filter(entry => entry.id !== id);
        if (task.templateId) {
          this.data.templates = this.data.templates.filter(template => template.id !== task.templateId);
          Object.values(this.data.days).forEach(entries => {
            const index = entries.findIndex(entry => entry.templateId === task.templateId);
            if (index !== -1) entries.splice(index, 1);
          });
        }
        this.save();
        this.render();
      },

      recurrenceLabel(task) {
        if (!task.templateId) return this.viewOffset ? "Tomorrow" : "Today";
        const template = this.data.templates.find(item => item.id === task.templateId);
        if (!template) return "Today";
        if (template.recurrence === "daily") return "Daily";
        const dayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        return template.days.map(day => dayNames[day]).join(", ");
      },

      render() {
        this.ensureCurrentDay();
        const dateKey = this.getKeyForOffset(this.viewOffset);
        const selectedDate = this.dateFromKey(dateKey);
        const entries = this.data.days[dateKey];
        Elements.plannerDate.dateTime = dateKey;
        Elements.plannerDate.textContent = selectedDate.toLocaleDateString(undefined, {
          weekday: "long", month: "long", day: "numeric"
        });
        Elements.todayListButton.classList.toggle("active", this.viewOffset === 0);
        Elements.tomorrowListButton.classList.toggle("active", this.viewOffset === 1);

        const total = entries.length;
        const complete = entries.filter(task => task.completed).length;
        Elements.taskSummary.textContent = `${total} task${total === 1 ? "" : "s"} for ${this.viewOffset ? "tomorrow" : "today"}`;
        Elements.taskProgress.textContent = `${complete} complete`;

        if (total === 0) {
          Elements.taskList.innerHTML = '<li class="empty-tasks">Nothing on the list yet. Add a task above.</li>';
          return;
        }

        Elements.taskList.innerHTML = entries.map(task => `
          <li class="task-item${task.completed ? " done" : ""}">
            <input type="checkbox" data-task-toggle="${task.id}" ${task.completed ? "checked" : ""} aria-label="Mark ${TextTools.escapeHtml(task.title)} complete" />
            <span class="task-name">${TextTools.escapeHtml(task.title)}</span>
            <span class="recurrence-tag">${this.recurrenceLabel(task)}</span>
            <button class="icon-button" type="button" data-task-delete="${task.id}" aria-label="Delete ${TextTools.escapeHtml(task.title)}">Delete</button>
          </li>
        `).join("");
      }
    };

    const PageNavigation = {
      show(page) {
        const plannerVisible = page === "planner";
        const readerVisible = page === "reader";
        if (!readerVisible && AppState.isPlaying) ReaderEngine.stop();
        Elements.homePage.classList.toggle("active", page === "home");
        Elements.readerPage.classList.toggle("active", readerVisible);
        Elements.plannerPage.classList.toggle("active", plannerVisible);
        Elements.homePageButton.classList.toggle("active", page === "home");
        Elements.readerPageButton.classList.toggle("active", readerVisible);
        Elements.plannerPageButton.classList.toggle("active", plannerVisible);
        Elements.pageNav.classList.toggle("hidden", page === "home");
        if (plannerVisible) Planner.render();
      }
    };

    function bindEvents() {
      Elements.playButton.addEventListener("click", () => {
        ReaderEngine.togglePlayback();
      });

      Elements.resetButton.addEventListener("click", () => {
        ReaderEngine.reset();
      });

      Elements.sourceText.addEventListener("input", () => {
        if (AppState.isPlaying) return;

        TextDocument.syncFromEditor({ scrollTrace: false });

        UI.setStatus("Ready");
        UI.updateIdleStats();
      });

      Elements.sourceTrace.addEventListener("click", event => {
        const wordElement = event.target.closest(".word");
        if (!wordElement) return;

        const index = Number(wordElement.dataset.index);
        ReaderEngine.setStartIndex(index);
      });

      [
        Elements.warmupWpmInput,
        Elements.targetWpmInput,
        Elements.rampSecondsInput,
        Elements.chunkInput
      ].forEach(input => {
        input.addEventListener("change", () => {
          SettingsRepository.saveSettings();
        });
      });

      Elements.homePageButton.addEventListener("click", () => PageNavigation.show("home"));
      Elements.readerPageButton.addEventListener("click", () => PageNavigation.show("reader"));
      Elements.plannerPageButton.addEventListener("click", () => PageNavigation.show("planner"));
      document.querySelectorAll("[data-go-to]").forEach(button => {
        button.addEventListener("click", () => PageNavigation.show(button.dataset.goTo));
      });

      Elements.todayListButton.addEventListener("click", () => {
        Planner.viewOffset = 0;
        Planner.render();
      });
      Elements.tomorrowListButton.addEventListener("click", () => {
        Planner.viewOffset = 1;
        Planner.render();
      });

      Elements.recurrenceInput.addEventListener("change", () => {
        Elements.weeklyDays.classList.toggle("visible", Elements.recurrenceInput.value === "weekly");
      });

      Elements.taskForm.addEventListener("submit", event => {
        event.preventDefault();
        const recurrence = Elements.recurrenceInput.value;
        const days = [...Elements.weeklyDays.querySelectorAll("input:checked")].map(input => Number(input.value));
        if (recurrence === "weekly" && days.length === 0) {
          Elements.taskTitleInput.setCustomValidity("Choose at least one weekday for a weekly task.");
          Elements.taskTitleInput.reportValidity();
          Elements.taskTitleInput.setCustomValidity("");
          return;
        }
        Planner.addTask(Elements.taskTitleInput.value, recurrence, days);
        Elements.taskForm.reset();
        Elements.weeklyDays.classList.remove("visible");
        Elements.taskTitleInput.focus();
      });

      Elements.taskList.addEventListener("change", event => {
        if (event.target.matches("[data-task-toggle]")) Planner.toggleTask(event.target.dataset.taskToggle);
      });

      Elements.taskList.addEventListener("click", event => {
        const button = event.target.closest("[data-task-delete]");
        if (button) Planner.removeTask(button.dataset.taskDelete);
      });
    }

    function initApp() {
      SettingsRepository.loadSettings();
      Planner.load();
      bindEvents();

      UI.setStatus("Ready");
      UI.setPlayButton(false);
      UI.updateSpeedPill(0);
      UI.updateIdleStats();
      SourceTrace.render();
      Planner.render();
      setInterval(() => Planner.render(), 60 * 1000);
    }

    initApp();
  </script>
</body>
</html>
