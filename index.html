<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading Speed Trainer</title>

  <style>
    :root {
      --bg: #080b10;
      --panel: #111722;
      --panel-light: #172131;
      --border: #2c3a4f;
      --text: #f4f7fb;
      --muted: #9da9bb;
      --accent: #5dd6ff;
      --accent-soft: rgba(93, 214, 255, 0.15);
      --highlight: #ffe066;
      --highlight-text: #111;
      --danger: #ff6b6b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(93, 214, 255, 0.16), transparent 35%),
        radial-gradient(circle at bottom right, rgba(120, 90, 255, 0.14), transparent 35%),
        var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto 25vh;
      gap: 14px;
      padding: 18px;
    }

    .reader-panel {
      background: linear-gradient(180deg, rgba(23, 33, 49, 0.9), rgba(13, 18, 27, 0.95));
      border: 1px solid var(--border);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .title-block h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0.3px;
    }

    .title-block p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .status-pill {
      padding: 8px 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      border-radius: 999px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .flash-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      text-align: center;
    }

    #display {
      max-width: 90%;
      font-size: clamp(42px, 6vw, 96px);
      line-height: 1.18;
      font-weight: 700;
      letter-spacing: -1.5px;
      text-wrap: balance;
    }

    .controls-panel {
      background: rgba(17, 23, 34, 0.88);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 8px 10px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    input {
      width: 82px;
      background: #0b111a;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 9px;
      padding: 9px 10px;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    button {
      border: 0;
      border-radius: 11px;
      padding: 10px 16px;
      font-size: 15px;
      cursor: pointer;
      color: var(--text);
      background: #253248;
      transition: transform 0.08s ease, background 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      background: #334563;
    }

    button:active {
      transform: scale(0.98);
    }

    .primary {
      background: linear-gradient(135deg, #1c9ee8, #44d4ff);
      color: #06111a;
      font-weight: 700;
    }

    .primary:hover {
      background: linear-gradient(135deg, #35b8ff, #6ce0ff);
    }

    .danger {
      background: rgba(255, 107, 107, 0.14);
      color: #ffb7b7;
      border: 1px solid rgba(255, 107, 107, 0.25);
    }

    .danger:hover {
      background: rgba(255, 107, 107, 0.22);
    }

    .text-panel {
      background: rgba(17, 23, 34, 0.94);
      border: 1px solid var(--border);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .text-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .text-panel-header strong {
      font-size: 14px;
    }

    .text-panel-header span {
      color: var(--muted);
      font-size: 12px;
    }

    #textInput {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px;
      outline: none;
      color: #dce7f5;
      font-size: 18px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #textInput:empty::before {
      content: "Paste your text here. The current word group will highlight here while the words flash above.";
      color: #6f7b8d;
    }

    .word {
      border-radius: 6px;
      padding: 1px 2px;
      margin: 0 1px;
    }

    .word.current {
      background: var(--highlight);
      color: var(--highlight-text);
      box-shadow: 0 0 0 2px rgba(255, 224, 102, 0.15);
    }

    .word.past {
      color: #7f8ca1;
    }

    .progress-bar {
      height: 4px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }

    #progressFill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #1c9ee8, #44d4ff);
      transition: width 0.15s linear;
    }

    @media (max-width: 700px) {
      .app {
        padding: 10px;
        gap: 10px;
        grid-template-rows: 1fr auto 30vh;
      }

      .top-bar {
        padding: 14px;
        align-items: flex-start;
        gap: 10px;
      }

      .title-block h1 {
        font-size: 18px;
      }

      .status-pill {
        font-size: 12px;
      }

      .controls-panel {
        justify-content: stretch;
      }

      .control-group {
        width: 100%;
        justify-content: space-between;
      }

      button {
        flex: 1;
      }

      #display {
        font-size: clamp(36px, 11vw, 70px);
      }

      #textInput {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="reader-panel">
      <div class="top-bar">
        <div class="title-block">
          <h1>Reading Speed Trainer</h1>
          <p>Paste text below, set your speed, then start the word stream.</p>
        </div>

        <div class="status-pill" id="statusPill">
          Ready
        </div>
      </div>

      <div class="flash-area">
        <div id="display">Paste text below to begin</div>
      </div>
    </section>

    <section class="controls-panel">
      <div class="control-group">
        <label for="wpmInput">Words per minute</label>
        <input id="wpmInput" type="number" value="300" min="50" max="1500" />
      </div>

      <div class="control-group">
        <label for="chunkInput">Words at once</label>
        <input id="chunkInput" type="number" value="3" min="1" max="12" />
      </div>

      <button class="primary" onclick="startReading()">Start</button>
      <button onclick="pauseReading()">Pause</button>
      <button class="danger" onclick="resetReading()">Reset</button>
    </section>

    <section class="text-panel">
      <div class="text-panel-header">
        <strong>Source text</strong>
        <span id="stats">Progress: 0 / 0 words</span>
      </div>

      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>

      <div id="textInput" contenteditable="true"></div>
    </section>
  </main>

  <script>
    let rawText = "";
    let words = [];
    let currentIndex = 0;
    let currentChunkStart = 0;
    let currentChunkEnd = 0;
    let timer = null;
    let isPrepared = false;

    const textInput = document.getElementById("textInput");
    const display = document.getElementById("display");
    const stats = document.getElementById("stats");
    const statusPill = document.getElementById("statusPill");
    const progressFill = document.getElementById("progressFill");

    textInput.addEventListener("paste", function(event) {
      event.preventDefault();

      const pastedText = event.clipboardData.getData("text/plain");
      document.execCommand("insertText", false, pastedText);
    });

    textInput.addEventListener("input", function() {
      if (!timer) {
        isPrepared = false;
        rawText = textInput.innerText.trim();
        updateIdleStats();
      }
    });

    function getSettings() {
      const wpm = Number(document.getElementById("wpmInput").value);
      const chunkSize = Number(document.getElementById("chunkInput").value);

      return {
        wpm: Math.max(50, Math.min(wpm || 300, 1500)),
        chunkSize: Math.max(1, Math.min(chunkSize || 3, 12))
      };
    }

    function prepareWords() {
      rawText = textInput.innerText.trim();

      words = rawText
        .split(/\s+/)
        .filter(word => word.length > 0);

      currentIndex = 0;
      currentChunkStart = 0;
      currentChunkEnd = 0;
      isPrepared = true;

      renderTextWithHighlights();
      updateStats();
    }

    function renderTextWithHighlights() {
      if (words.length === 0) {
        return;
      }

      const html = words.map((word, index) => {
        const safeWord = escapeHtml(word);

        if (index >= currentChunkStart && index < currentChunkEnd) {
          return `<span class="word current" id="word-${index}">${safeWord}</span>`;
        }

        if (index < currentChunkStart) {
          return `<span class="word past" id="word-${index}">${safeWord}</span>`;
        }

        return `<span class="word" id="word-${index}">${safeWord}</span>`;
      }).join(" ");

      textInput.innerHTML = html;

      const currentWordElement = document.getElementById("word-" + currentChunkStart);

      if (currentWordElement) {
        currentWordElement.scrollIntoView({
          behavior: "smooth",
          block: "center",
          inline: "nearest"
        });
      }
    }

    function startReading() {
      if (timer !== null) return;

      if (!isPrepared) {
        prepareWords();
      }

      if (words.length === 0) {
        display.textContent = "Paste text below first";
        statusPill.textContent = "No text";
        return;
      }

      statusPill.textContent = "Playing";

      const settings = getSettings();
      const delay = (60000 / settings.wpm) * settings.chunkSize;

      showNextChunk();

      timer = setInterval(showNextChunk, delay);
    }

    function showNextChunk() {
      const settings = getSettings();

      if (currentIndex >= words.length) {
        pauseReading();
        display.textContent = "Finished";
        statusPill.textContent = "Finished";
        updateStats();
        return;
      }

      currentChunkStart = currentIndex;
      currentChunkEnd = Math.min(currentIndex + settings.chunkSize, words.length);

      const chunk = words.slice(currentChunkStart, currentChunkEnd);
      display.textContent = chunk.join(" ");

      currentIndex = currentChunkEnd;

      renderTextWithHighlights();
      updateStats();
    }

    function pauseReading() {
      clearInterval(timer);
      timer = null;

      if (words.length > 0 && currentIndex < words.length) {
        statusPill.textContent = "Paused";
      }
    }

    function resetReading() {
      pauseReading();

      currentIndex = 0;
      currentChunkStart = 0;
      currentChunkEnd = 0;
      words = [];
      isPrepared = false;

      textInput.innerText = rawText;

      display.textContent = rawText.length > 0
        ? "Press Start to begin"
        : "Paste text below to begin";

      statusPill.textContent = "Ready";
      updateIdleStats();
    }

    function updateStats() {
      const completed = Math.min(currentIndex, words.length);
      const percentage = words.length === 0 ? 0 : (completed / words.length) * 100;

      stats.textContent = `Progress: ${completed} / ${words.length} words`;
      progressFill.style.width = percentage + "%";
    }

    function updateIdleStats() {
      const idleWords = rawText.length === 0
        ? []
        : rawText.split(/\s+/).filter(word => word.length > 0);

      stats.textContent = `Progress: 0 / ${idleWords.length} words`;
      progressFill.style.width = "0%";
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
